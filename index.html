<h1>Places</h1>
<i>List</i>

<form>
	<label class="btn" for="import">Import</label>
	<input id="import" class="btn" type="file">
	<a id="export" class="btn" href="./">Export</a><br />
	<input id="txt" type="text" onkeydown="if(event.keyCode === 13)return false;"><br />
	<input id="add" class="btn" type="button" value="Add">
	<input id="edit" class="btn" type="button" value="Edit">
	<input id="del" class="btn" type="button" value="Delete">
	<input id="up" class="btn" type="button" value="Up">
	<input id="down" class="btn" type="button" value="Down">
</form>
